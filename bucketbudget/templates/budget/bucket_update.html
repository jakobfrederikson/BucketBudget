{% extends 'base.html' %}

{% block header %}
  <h1 class="update-page-header">{% block title %}Edit Bucket: "{{ bucket.title }}"{% endblock %}</h1>
{% endblock %}

{% block content %}
{% from "_formhelpers.html" import render_field %}
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
    <dl>
      {{ render_field(form.title) }}
      {{ render_field(form.percent) }}
    </dl>
    
    <div class="field">
      <div class="control">
        <button type="submit" class="button is-primary">
          Save
        </button>
        <a class="button" href="{{ url_for('budget.read', budget_id=budget_id) }}">
          Back
        </a>
      </div>
    </div>

  </form>
{% endblock %}
