{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Edit "{{ bucket['title'] }}"{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="title">Title</label>
    <input name="title" id="title"
      value="{{ request.form['title'] or bucket['title'] }}" required>
    <label for="percent">Percent</label>
    <input name="percent" id="percent" type="number" value="{{ request.form['percent'] or bucket['percent'] }}" required>
    <input type="submit" value="Save">
  </form>
  <hr>
  <form action="{{ url_for('budget.delete_bucket_item', budget_id=budget_id, bucket_id=bucket['id']) }}" method="post">
      <input class="danger" type="submit" value="Delete this expense item" onclick="return confirm('Are you sure?');">
    </form>
{% endblock %}
