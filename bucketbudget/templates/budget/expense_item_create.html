{% extends 'base.html' %}

{% block header %}
    <h1>{% block title %}Add expense item{% endblock %}</h1>
{% endblock %}

{% block content %}
<form method="post">
    <label for="user_id">Select the name of a user if this expense relates only to them.</label>
    <select name="user_id" id="user_id">
      <option value="-1" selected>General Income</option>
      {% for member in budget_members %}
        <option value="{{ member.id }}">{{ member.username }}</option>
      {% endfor %}
    </select>


    <label for="title">Title</label>
    <input name="title" id="title" value="{{ request.form['title'] }}" required>

    <label for="amount">Amount</label>
    <input name="amount" id="amount" type="number" value="{{ request.form['amount'] }}" required>

    <label for="frequency">Frequency</label>
    <select name="frequency" id="frequency">
      <option value="Weekly">Weekly</option>
      <option value="Fortnightly">Fortnightly</option>
      <option value="Four-Weekly">Four-Weekly</option>
      <option value="Monthly">Monthly</option>
      <option value="Yearly">Yearly</option>
    </select>

    <label for="expense_bucket">Is this an expense bucket?</label>
    <input name="expense_bucket" id="expense_bucket" type="checkbox">    

    <input type="submit" value="Save">
  </form>
{% endblock %}
