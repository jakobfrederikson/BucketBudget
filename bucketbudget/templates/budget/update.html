{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}Edit "{{ budget['title'] }}"{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="title">Title</label>
    <input name="title" id="title"
      value="{{ request.form['title'] or budget['title'] }}" required>

    <label for="frequency">Frequency</label>
    <select name="frequency" id="frequency" value="{{ request.form['frequency'] or budget['frequency'] }}">
      <option value="Weekly">Weekly</option>
      <option value="Fortnightly">Fortnightly</option>
      <option value="Four-Weekly">Four-Weekly</option>
      <option value="Yearly">Yearly</option>
    </select>

    <input type="submit" value="Save">
  </form>
  <hr>
  <form action="{{ url_for('budget.delete', id=budget['id']) }}" method="post">
    <input class="danger" type="submit" value="Delete this budget" onclick="return confirm('Are you sure?');">
  </form>
{% endblock %}
